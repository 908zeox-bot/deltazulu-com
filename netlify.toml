[build]
  publish = "."

[[redirects]]
  from = "/dashboard"
  to   = "https://zeox-studio.tail1e84a3.ts.net"
  status = 302
  force  = true

[[redirects]]
  from = "https://www.deltazulu.com/dashboard"
  to   = "https://zeox-studio.tail1e84a3.ts.net"
  status = 302
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
